<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1C1C1E">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Debit Monitoring">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Monitoring Debit Bendung v8.1 Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --ios-green: #34C759; 
            --ios-red: #FF3B30;
            --ios-orange: #FF9500;
            --ios-card: rgba(255, 255, 255, 0.95);
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --home-icon: #FFFFFF;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 40px; background-color: #F2F2F7; overflow-x: hidden; }

        /* Adaptif Floating Home Button */
        .btn-home-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home-floating {
            width: 46px;
            height: 46px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1.5px solid var(--glass-border);
            border-radius: 16px; /* Squircle style */
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--home-icon);
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .home-label {
            font-size: 13px;
            font-weight: 700;
            color: #1C1C1E;
            background: white;
            padding: 6px 14px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            opacity: 0;
            transform: translateX(-10px);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Desktop View Adjustments */
        @media (min-width: 768px) {
            :root {
                --glass-bg: rgba(255, 255, 255, 0.8);
                --glass-border: rgba(0, 0, 0, 0.1);
                --home-icon: #007AFF;
            }
            .btn-home-floating:hover {
                transform: scale(1.05) translateY(-2px);
                background: white;
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            }
            .btn-home-floating:hover + .home-label {
                opacity: 1;
                transform: translateX(0);
            }
            .btn-home-floating {
                box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            }
        }

        .btn-home-floating:active {
            transform: scale(0.92);
        }

        /* UI Elements */
        .hero-pro {
            background: linear-gradient(180deg, #1C1C1E 0%, #2C2C2E 100%);
            padding: 85px 24px 60px;
            border-bottom-left-radius: 45px; border-bottom-right-radius: 45px; 
            color: white; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.theme-siaga { background-color: #FFF9F2; }
        body.theme-bahaya { background-color: #FFF2F2; }
        .hero-siaga { background: linear-gradient(180deg, var(--ios-orange) 0%, #E68600 100%) !important; }
        .hero-bahaya { background: linear-gradient(180deg, var(--ios-red) 0%, #D73128 100%) !important; }

        .badge-system {
            background: rgba(255,255,255,0.15); color: white; padding: 4px 12px; border-radius: 20px;
            font-size: 10px; font-weight: 800; letter-spacing: 1px; display: inline-block; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .instansi-title { font-size: 11px; font-weight: 700; opacity: 0.6; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }
        .main-title { font-size: 26px; font-weight: 800; margin: 5px 0 20px; letter-spacing: -0.5px; color: #fff; }

        .time-box-capsule {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center;
        }

        .container { max-width: 500px; margin: auto; padding: 0 16px; }
        .card { 
            background: var(--ios-card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); position: relative;
        }
        
        .card-label { font-size: 11px; font-weight: 800; color: var(--ios-blue); text-transform: uppercase; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

        input, select { 
            width: 100%; height: 52px; border: 1.5px solid rgba(0,0,0,0.06); border-radius: 16px; 
            background: #F9F9FB; padding: 0 16px; font-size: 15px; margin-bottom: 12px; font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--ios-blue); background: white; outline: none; }
        
        .btn-send { 
            background: var(--ios-green); color: white; border: none; height: 68px; 
            border-radius: 25px; width: 100%; font-size: 17px; font-weight: 800; 
            cursor: pointer; box-shadow: 0 12px 30px rgba(52, 199, 89, 0.3); display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 30px; transition: all 0.3s ease;
        }
        .btn-send:active { transform: scale(0.97); }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121214; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s ease; }
        #splash-screen.fade-out { opacity: 0; visibility: hidden; }

        .camera-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .camera-box {
            border: 2px dashed rgba(0,122,255,0.3); border-radius: 20px; padding: 20px 15px; text-align: center;
            color: var(--ios-blue); font-weight: 700; font-size: 11px; cursor: pointer;
            background: rgba(0,122,255,0.04); transition: all 0.3s ease;
        }
        .camera-box:active { background: rgba(0,122,255,0.1); }
        .preview-img { width: 100%; border-radius: 12px; margin-top: 10px; display: none; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); object-fit: cover; aspect-ratio: 4/3; }
        
        .error-toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            background: #1C1C1E; color: white; padding: 14px 28px; border-radius: 25px;
            font-size: 13px; font-weight: 700; z-index: 4000; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 40px; opacity: 1; } }
    </style>
</head>
<body>

<div id="splash-screen">
    <i class="fa-solid fa-droplet" style="font-size:55px; color:var(--ios-blue);"></i>
    <h2 style="color:white; margin-top:20px; letter-spacing:4px; font-weight:800; font-size:16px;">DEBIT PRO V8.1</h2>
</div>

<!-- Adaptif Home Button Container -->
<div class="btn-home-container">
    <a href="home.html" class="btn-home-floating" title="Kembali ke Beranda">
        <i class="fa-solid fa-house"></i>
    </a>
    <span class="home-label">Beranda</span>
</div>

<div id="error-toast" class="error-toast">⚠️ Mohon lengkapi semua kolom!</div>

<div class="container">
    <div class="hero-pro" id="hero" style="margin-left:-16px; margin-right:-16px;">
        <div class="badge-system">OFFICIAL DEPLOYMENT</div>
        <p class="instansi-title">UPT PSDA BONDOYUDO BARU</p>
        <h1 class="main-title">Input Laporan Debit</h1>
        
        <div class="time-box-capsule">
            <div>
                <span id="day-info" style="font-size:9px; font-weight:800; opacity:0.6; display:block; text-transform:uppercase;">...</span>
                <div id="live-time" style="font-family:'JetBrains Mono'; font-size:22px; font-weight:700;">00:00:00</div>
            </div>
            <div id="w-icon"><i class="fa-solid fa-cloud-sun" style="color:#FFD60A; font-size:24px;"></i></div>
        </div>
    </div>

    <!-- Section 1 -->
    <div class="card" style="margin-top:-35px;">
        <span class="card-label"><i class="fa-solid fa-user-shield"></i> 1. Administrasi</span>
        <input type="text" id="petugas" placeholder="Nama Petugas Pelapor">
        <div style="display:flex; gap:10px;">
            <input type="date" id="tgl">
            <input type="time" id="jam">
        </div>
        <select id="sDI" onchange="hDI()">
            <option value="">Pilih Daerah Irigasi...</option>
            <option>DI BARU</option>
            <option>DI POROLINGGO</option>
            <option value="m">LAINNYA...</option>
        </select>
        <input type="text" id="mDI" style="display:none;" placeholder="Masukkan Nama DI">
        
        <select id="sB" onchange="hB()">
            <option value="">Pilih Bendung...</option>
            <option>BENDUNG KARANGDORO</option>
            <option>BENDUNG SUMBERMULYO</option>
            <option value="m">LAINNYA...</option>
        </select>
        <input type="text" id="mB" style="display:none;" placeholder="Masukkan Nama Bendung">
    </div>

    <!-- Section 2 -->
    <div class="card">
        <span class="card-label"><i class="fa-solid fa-chart-line"></i> 2. Data Teknis</span>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span style="font-size: 11px; font-weight: 800; opacity: 0.5;">TMA & KONDISI</span>
            <select id="trend" style="width: 120px; height: 38px; margin-bottom: 0; font-size: 13px; background: white;">
                <option value="Tetap">📊 Tetap</option>
                <option value="Naik">📈 Naik</option>
                <option value="Turun">📉 Turun</option>
            </select>
        </div>
        <input type="text" id="tma" placeholder="TMA (cm)" inputmode="decimal" oninput="fR(this)">
        <input type="text" id="mon" placeholder="Debit Monitoring (Cm³/dt)" inputmode="decimal" oninput="fR(this)">
        
        <div style="background:#F2F2F7; padding:15px; border-radius:20px; margin-top:10px; border: 1px solid rgba(0,0,0,0.03);">
            <span style="font-size:10px; font-weight:800; display:block; margin-bottom:10px; color: var(--ios-blue);">INTAKE KIRI</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                <div>
                    <span style="font-size:9px; font-weight:700; margin-left:5px;">L (m)</span>
                    <input type="text" id="lk" placeholder="0.00" inputmode="decimal" oninput="fR(this)">
                </div>
                <div>
                    <span style="font-size:9px; font-weight:700; margin-left:5px;">Qact</span>
                    <input type="text" id="qk" placeholder="0.00" inputmode="decimal" oninput="fR(this)">
                </div>
                <div>
                    <span style="font-size:9px; font-weight:700; margin-left:5px;">Qd</span>
                    <input type="text" id="dk" placeholder="0.00" inputmode="decimal" oninput="fR(this)">
                </div>
            </div>
        </div>
    </div>

    <!-- Section 3 -->
    <div class="card">
        <span class="card-label"><i class="fa-solid fa-camera-retro"></i> 3. Dokumentasi</span>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
            <select id="cuaca" style="background:white;">
                <option>☀️ Cerah</option>
                <option>☁️ Mendung</option>
                <option>🌧️ Hujan</option>
            </select>
            <select id="status" onchange="uS()" style="background:white;">
                <option value="Aman">✅ Aman</option>
                <option value="Siaga">⚠️ Siaga</option>
                <option value="Bahaya">🚨 Bahaya</option>
            </select>
        </div>
        
        <div class="camera-grid">
            <label class="camera-box" for="cam-intake">
                <i class="fa-solid fa-water" style="font-size:18px; margin-bottom:8px;"></i><br>FOTO INTAKE
                <input type="file" id="cam-intake" accept="image/*" capture="camera" style="display:none;" onchange="processPhoto(this, 'intake')">
                <img id="preview-intake" class="preview-img">
            </label>
            <label class="camera-box" for="cam-limpasan">
                <i class="fa-solid fa-droplet" style="font-size:18px; margin-bottom:8px;"></i><br>FOTO LIMPASAN
                <input type="file" id="cam-limpasan" accept="image/*" capture="camera" style="display:none;" onchange="processPhoto(this, 'limpasan')">
                <img id="preview-limpasan" class="preview-img">
            </label>
        </div>
    </div>

    <button id="main-btn" class="btn-send" onclick="validateAndSend()">
        <i class="fa-brands fa-whatsapp" style="font-size:22px;"></i> KIRIM LAPORAN
    </button>
</div>

<script>
    function fR(input) {
        let v = input.value.replace(/[^0-9.]/g, '');
        if (v && !v.includes('.')) {
            // Biarkan format titik desimal jika ada
            // input.value = parseFloat(v).toLocaleString('id-ID'); 
        }
    }

    function hDI() { document.getElementById('mDI').style.display = document.getElementById('sDI').value==='m'?'block':'none'; }
    function hB() { document.getElementById('mB').style.display = document.getElementById('sB').value==='m'?'block':'none'; }

    function uS() {
        const s = document.getElementById('status').value;
        const b = document.body;
        const h = document.getElementById('hero');
        b.className = ''; h.className = 'hero-pro';
        if(s==='Siaga') { b.classList.add('theme-siaga'); h.classList.add('hero-siaga'); }
        else if(s==='Bahaya') { b.classList.add('theme-bahaya'); h.classList.add('hero-bahaya'); }
    }

    function clock() {
        const n = new Date();
        const liveTimeEl = document.getElementById('live-time');
        if(liveTimeEl) liveTimeEl.innerText = n.toLocaleTimeString('id-ID').replace(/\./g, ':');
        const dayInfoEl = document.getElementById('day-info');
        if(dayInfoEl) {
            const hariArr = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
            const bulanArr = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
            dayInfoEl.innerText = `${hariArr[n.getDay()]}, ${n.getDate()} ${bulanArr[n.getMonth()]} ${n.getFullYear()}`;
        }
    }

    window.onload = () => {
        document.getElementById('tgl').value = new Date().toISOString().split('T')[0];
        document.getElementById('jam').value = new Date().toTimeString().substring(0,5);
        setInterval(clock, 1000);
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            if(splash) splash.classList.add('fade-out');
        }, 1200);
    };

    function validateAndSend() {
        const p = document.getElementById('petugas').value;
        const tma = document.getElementById('tma').value;
        if(!p || !tma) {
            const toast = document.getElementById('error-toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
            return;
        }
        // Logic kirim WA...
        alert("Laporan tervalidasi. Membuka WhatsApp...");
    }
    
    function processPhoto(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview-' + type);
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
