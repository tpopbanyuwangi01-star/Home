<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1C1C1E">
    
    <title>Monitoring Debit Bendung v8.0 Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --ios-green: #34C759; 
            --ios-red: #FF3B30;
            --ios-orange: #FF9500;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F2F2F7; 
            transition: all 0.5s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            body { background-color: #000000; }
            .card-ios { background: rgba(28, 28, 30, 0.9) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white; }
            .input-field { background: #2C2C2E !important; border-color: #3A3A3C !important; color: white; }
            label.text-gray-400 { color: #8E8E93; }
        }
        
        body.theme-siaga { background-color: #FFF9F2; }
        body.theme-bahaya { background-color: #FFF2F2; }
        .hero-siaga { background: linear-gradient(180deg, var(--ios-orange) 0%, #E68600 100%) !important; }
        .hero-bahaya { background: linear-gradient(180deg, var(--ios-red) 0%, #D73128 100%) !important; }

        .btn-home-green {
            background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%) !important;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
            border: 2px solid #ffffff;
            z-index: 100;
        }

        .header-black {
            background: linear-gradient(180deg, #1C1C1E 0%, #2C2C2E 100%);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            transition: all 0.5s ease;
        }

        .card-ios {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-field {
            width: 100%;
            height: 52px;
            background: #ffffff;
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: 14px;
            padding: 0 16px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: var(--ios-blue);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
            outline: none;
        }

        .input-field.invalid {
            border-color: var(--ios-red) !important;
            background-color: rgba(255, 59, 48, 0.05) !important;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .camera-box {
            border: 2px dashed var(--ios-blue);
            background: rgba(0,122,255,0.03);
            border-radius: 20px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; transition: 0.8s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #splash-screen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 14px 28px; border-radius: 50px; font-size: 14px; font-weight: 700;
            z-index: 1000; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 40px; opacity: 1; } }

        .btn-animate:active { transform: scale(0.96); }
    </style>
</head>
<body class="pb-12">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="relative">
            <i class="fa-solid fa-droplet text-blue-500 text-7xl animate-bounce"></i>
            <div class="absolute -bottom-2 w-full h-2 bg-blue-900/20 blur-xl rounded-full"></div>
        </div>
        <h2 class="text-white tracking-[0.4em] font-black text-xs text-center mt-8">DEBIT MONITORING<br><span class="text-blue-500">VERSION 8.0 PRO</span></h2>
    </div>

    <!-- Toasts -->
    <div id="error-toast" class="toast bg-red-600 text-white"><i class="fa-solid fa-circle-exclamation mr-2"></i> Periksa kolom yang merah!</div>
    <div id="success-toast" class="toast bg-green-600 text-white"><i class="fa-solid fa-circle-check mr-2"></i> Data Berhasil Terkirim!</div>

    <!-- Floating Home -->
    <button onclick="location.reload()" class="fixed top-8 left-6 btn-home-green w-12 h-12 rounded-full flex items-center justify-center text-white z-50 btn-animate">
        <i class="fa-solid fa-house"></i>
    </button>

    <!-- Header -->
    <div class="header-black pt-20 pb-24 px-6 text-center text-white shadow-2xl relative overflow-hidden" id="hero">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <div class="absolute top-10 left-10 w-32 h-32 bg-blue-500 rounded-full blur-3xl"></div>
            <div class="absolute bottom-10 right-10 w-32 h-32 bg-indigo-500 rounded-full blur-3xl"></div>
        </div>

        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-[9px] font-black tracking-widest border border-white/10 mb-6 bg-white/5 uppercase">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Official Enterprise System
        </div>
        <p class="text-white/40 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">UPT PSDA Bondoyudo Baru</p>
        <h1 class="text-4xl font-black mb-10 tracking-tighter">Debit Monitoring</h1>

        <!-- Digital Clock -->
        <div class="max-w-xs mx-auto bg-black/30 backdrop-blur-2xl rounded-[32px] p-6 flex items-center justify-between border border-white/5 shadow-inner">
            <div class="text-left">
                <p class="text-[9px] text-blue-400 font-black uppercase tracking-widest mb-1" id="day-info">MEMUAT...</p>
                <p class="text-3xl font-black tracking-tighter font-mono" id="live-time">00:00:00</p>
            </div>
            <div id="w-icon" class="text-yellow-400 text-3xl drop-shadow-[0_0_10px_rgba(250,204,21,0.5)]">
                <i class="fa-solid fa-sun"></i>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="max-w-lg mx-auto -mt-12 px-5 space-y-5 relative z-10">
        
        <!-- Step 1 -->
        <div class="card-ios p-6">
            <div class="flex items-center gap-3 text-blue-500 font-black text-[11px] uppercase mb-5 tracking-wider">
                <div class="w-6 h-6 rounded-full bg-blue-500/10 flex items-center justify-center"><i class="fa-solid fa-user-shield"></i></div>
                1. Data Administrasi
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="petugas" placeholder="NAMA PETUGAS PELAPOR" class="input-field uppercase pr-10" oninput="this.value = this.value.toUpperCase(); this.classList.remove('invalid')">
                    <i class="fa-solid fa-id-badge absolute right-4 top-4 text-gray-300"></i>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="tgl" class="input-field" onchange="this.classList.remove('invalid')">
                    <input type="time" id="jam" class="input-field" onchange="this.classList.remove('invalid')">
                </div>
                <select id="sDI" class="input-field appearance-none" onchange="hDI(); this.classList.remove('invalid')">
                    <option value="">Pilih Daerah Irigasi...</option>
                    <option>DI. BONDOYUDO</option>
                    <option>DI. BEDADUNG</option>
                    <option>DI. BARU</option>
                    <option value="m">LAINNYA (MANUAL)...</option>
                </select>
                <input type="text" id="mDI" class="input-field hidden uppercase border-blue-400" placeholder="Ketik Nama DI">
                
                <select id="sB" class="input-field appearance-none" onchange="hB(); this.classList.remove('invalid')">
                    <option value="">Pilih Nama Bendung...</option>
                    <option>BENDUNG BORENG</option>
                    <option>BENDUNG BARU</option>
                    <option>BENDUNG DARUNG</option>
                    <option value="m">LAINNYA (MANUAL)...</option>
                </select>
                <input type="text" id="mB" class="input-field hidden uppercase border-blue-400" placeholder="Ketik Nama Bendung">
            </div>
        </div>

        <!-- Step 2 -->
        <div class="card-ios p-6">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-3 text-blue-500 font-black text-[11px] uppercase tracking-wider">
                    <div class="w-6 h-6 rounded-full bg-blue-500/10 flex items-center justify-center"><i class="fa-solid fa-wave-square"></i></div>
                    2. Pengukuran Debit
                </div>
                <select id="trend" class="text-[10px] font-black border-2 border-blue-100 rounded-xl px-3 h-8 outline-none bg-blue-50 text-blue-600" onchange="this.classList.remove('invalid')">
                    <option value="">TREND</option>
                    <option value="Tetap">➡ Tetap</option>
                    <option value="Naik">⬆ Naik</option>
                    <option value="Turun">⬇ Turun</option>
                </select>
            </div>
            
            <div class="space-y-5">
                <div class="grid grid-cols-1 gap-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Tinggi Muka Air (TMA) CM</label>
                    <input type="text" id="tma" placeholder="0" inputmode="decimal" class="input-field font-mono text-xl" oninput="fR(this); this.classList.remove('invalid')">
                </div>

                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-[24px] shadow-lg shadow-blue-200">
                    <label class="text-[10px] font-black text-white/60 uppercase tracking-[0.2em]">Monitoring Debit (Cm³/dt)</label>
                    <input type="text" id="mon" placeholder="00.000" inputmode="decimal" class="w-full bg-transparent border-none text-3xl font-black text-white outline-none font-mono placeholder-white/30" oninput="fR(this); this.classList.remove('invalid')">
                </div>

                <!-- Intake Tabs -->
                <div class="space-y-4 pt-2">
                    <div class="bg-gray-50 dark:bg-black/20 p-4 rounded-2xl border border-dashed border-gray-200">
                        <label class="text-[9px] font-black text-gray-500 uppercase flex items-center gap-2 mb-3"><i class="fa-solid fa-align-left text-blue-500"></i> Intake Kiri (Ha | Act | Qd)</label>
                        <div class="grid grid-cols-3 gap-3">
                            <input type="text" id="lk" placeholder="LUAS" inputmode="decimal" class="input-field text-center text-xs h-10 px-1" oninput="fR(this)">
                            <input type="text" id="qk" placeholder="Q-ACT" inputmode="decimal" class="input-field text-center text-xs h-10 px-1" oninput="fR(this); checkAlert('qk','dk')">
                            <input type="text" id="dk" placeholder="Q-D" inputmode="decimal" class="input-field text-center text-xs h-10 px-1" oninput="fR(this); checkAlert('qk','dk')">
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-black/20 p-4 rounded-2xl border border-dashed border-gray-200">
                        <label class="text-[9px] font-black text-gray-500 uppercase flex items-center gap-2 mb-3"><i class="fa-solid fa-align-right text-blue-500"></i> Intake Kanan (Ha | Act | Qd)</label>
                        <div class="grid grid-cols-3 gap-3">
                            <input type="text" id="lr" placeholder="LUAS" inputmode="decimal" class="input-field text-center text-xs h-10 px-1" oninput="fR(this)">
                            <input type="text" id="qr" placeholder="Q-ACT" inputmode="decimal" class="input-field text-center text-xs h-10 px-1" oninput="fR(this); checkAlert('qr','dr')">
                            <input type="text" id="dr" placeholder="Q-D" inputmode="decimal" class="input-field text-center text-xs h-10 px-1" oninput="fR(this); checkAlert('qr','dr')">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Step 3 -->
        <div class="card-ios p-6">
            <div class="flex items-center gap-3 text-blue-500 font-black text-[11px] uppercase mb-5 tracking-wider">
                <div class="w-6 h-6 rounded-full bg-blue-500/10 flex items-center justify-center"><i class="fa-solid fa-images"></i></div>
                3. Dokumentasi Visual
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-5">
                <select id="cuaca" class="input-field" onchange="uW(); this.classList.remove('invalid')">
                    <option value="">Cuaca...</option>
                    <option value="Cerah">☀️ Cerah</option>
                    <option value="Mendung">☁️ Mendung</option>
                    <option value="Hujan">🌧️ Hujan</option>
                </select>
                <select id="status" class="input-field" onchange="uS(); this.classList.remove('invalid')">
                    <option value="">Status...</option>
                    <option value="Aman">✅ Aman</option>
                    <option value="Siaga">⚠️ Siaga</option>
                    <option value="Bahaya">🚨 Bahaya</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <label class="camera-box aspect-square flex flex-col items-center justify-center transition-all hover:bg-blue-500/5 group" id="box-intake">
                    <div class="text-blue-500 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-camera-retro text-2xl mb-2"></i>
                    </div>
                    <span class="text-[9px] font-black text-blue-600 uppercase">Foto Intake</span>
                    <input type="file" class="hidden" accept="image/*" onchange="processPhoto(this, 'intake')">
                    <img id="preview-intake" class="absolute inset-0 w-full h-full object-cover hidden">
                </label>
                <label class="camera-box aspect-square flex flex-col items-center justify-center transition-all hover:bg-blue-500/5 group" id="box-limpasan">
                    <div class="text-blue-500 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-bridge-water text-2xl mb-2"></i>
                    </div>
                    <span class="text-[9px] font-black text-blue-600 uppercase">Foto Limpasan</span>
                    <input type="file" class="hidden" accept="image/*" onchange="processPhoto(this, 'limpasan')">
                    <img id="preview-limpasan" class="absolute inset-0 w-full h-full object-cover hidden">
                </label>
            </div>

            <div class="bg-blue-50 dark:bg-blue-900/10 p-5 rounded-3xl border border-blue-100">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-[10px] font-black text-blue-600 uppercase">Informasi Tanam</label>
                    <span id="persen-badge" class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-black shadow-md">0%</span>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <select id="mt" class="input-field text-xs h-12"><option value="">MT...</option><option>1</option><option>2</option><option>3</option></select>
                    <input type="text" id="baku" placeholder="BAKU" class="input-field text-xs h-12 text-center" oninput="fR(this); calcTanam()">
                    <input type="text" id="real" placeholder="REAL" class="input-field text-xs h-12 text-center" oninput="fR(this); calcTanam()">
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <div class="pt-4 pb-8">
            <button id="main-btn" onclick="validateAndSend()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-6 rounded-[30px] font-black text-sm uppercase tracking-[0.2em] shadow-2xl shadow-green-200 transition-all active:scale-95 btn-animate flex items-center justify-center gap-3">
                <i class="fa-brands fa-whatsapp text-2xl"></i> Kirim Laporan Pro
            </button>
            
            <div id="sync-status" class="text-center text-[11px] font-black text-blue-500 hidden mt-6 animate-pulse">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i> MENGUPLOAD DATA KE CLOUD...
            </div>
        </div>

        <p class="text-center opacity-30 text-[10px] font-black uppercase tracking-[0.4em] pb-10">
            System V8.0 Pro | © 2024
        </p>
    </div>

    <!-- Canvas for Image Processing -->
    <canvas id="hidden-canvas" class="hidden"></canvas>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwP1FWxZWN1NUrO4ulfHjzkFxAZC9tGe_HvSG3pwvdsAsgm408thHMidLzcYQhFmus3HQ/exec"; 
        let imgIntake = null;
        let imgLimpasan = null;

        // Auto-Formatting Numbers (Indonesian Style)
        function fR(input) {
            let v = input.value.replace(/[^0-9]/g, '');
            if (v) input.value = parseInt(v).toLocaleString('id-ID');
        }

        // Toggle Manual Inputs
        function hDI() { 
            const isManual = document.getElementById('sDI').value==='m';
            document.getElementById('mDI').classList.toggle('hidden', !isManual);
            if(isManual) document.getElementById('mDI').focus();
        }
        function hB() { 
            const isManual = document.getElementById('sB').value==='m';
            document.getElementById('mB').classList.toggle('hidden', !isManual);
            if(isManual) document.getElementById('mB').focus();
        }

        // UI Updates for Weather & Status
        function uW() {
            const c = document.getElementById('cuaca').value;
            const i = document.getElementById('w-icon');
            if(c.includes('Cerah')) i.innerHTML = '<i class="fa-solid fa-sun"></i>';
            else if(c.includes('Mendung')) i.innerHTML = '<i class="fa-solid fa-cloud text-gray-400"></i>';
            else if(c.includes('Hujan')) i.innerHTML = '<i class="fa-solid fa-cloud-showers-heavy text-blue-400"></i>';
        }

        function uS() {
            const s = document.getElementById('status').value;
            const b = document.body;
            const h = document.getElementById('hero');
            b.className = 'pb-12'; 
            h.className = 'header-black pt-20 pb-24 px-6 text-center text-white shadow-2xl relative overflow-hidden';
            
            if(s.includes('Siaga')) { b.classList.add('theme-siaga'); h.classList.add('hero-siaga'); }
            else if(s.includes('Bahaya')) { b.classList.add('theme-bahaya'); h.classList.add('hero-bahaya'); }
        }

        // Alerting high debit
        function checkAlert(actId, qdId) {
            const act = parseFloat(document.getElementById(actId).value.replace(/\./g, '')) || 0;
            const qd = parseFloat(document.getElementById(qdId).value.replace(/\./g, '')) || 0;
            document.getElementById(actId).style.color = (act > qd && qd > 0) ? 'var(--ios-red)' : '';
        }

        function calcTanam() {
            const baku = parseFloat(document.getElementById('baku').value.replace(/\./g, '')) || 0;
            const real = parseFloat(document.getElementById('real').value.replace(/\./g, '')) || 0;
            const badge = document.getElementById('persen-badge');
            if(baku > 0) {
                const p = ((real/baku)*100).toFixed(0);
                badge.innerText = p + '%';
                badge.className = (p > 100) ? 'bg-red-600 text-white text-[10px] px-3 py-1 rounded-full font-black shadow-md' : 'bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-black shadow-md';
            }
        }

        // Image Processing with Watermark
        function processPhoto(input, type) {
            if (!input.files || !input.files[0]) return;
            const box = document.getElementById(type === 'intake' ? 'box-intake' : 'box-limpasan');
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('hidden-canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Standard HD width
                    const targetW = 1280;
                    const scale = targetW / img.width;
                    canvas.width = targetW;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const bendungRaw = document.getElementById('sB').value==='m'?document.getElementById('mB').value:document.getElementById('sB').value;
                    const bendungText = (bendungRaw || "Bendung").toUpperCase();
                    const timeStr = new Date().toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'short' });
                    
                    // Sophisticated Overlays
                    ctx.fillStyle = "rgba(0,0,0,0.4)";
                    ctx.fillRect(0, canvas.height - 180, canvas.width, 180);
                    
                    ctx.fillStyle = "white";
                    ctx.font = "bold 44px 'Plus Jakarta Sans'";
                    ctx.fillText(`📍 ${bendungText} [${type.toUpperCase()}]`, 50, canvas.height - 90);
                    
                    ctx.font = "28px 'JetBrains Mono'";
                    ctx.fillStyle = "rgba(255,255,255,0.8)";
                    ctx.fillText(`⏱ ${timeStr} WIB | DEBIT PRO V8`, 50, canvas.height - 45);
                    
                    // Accent Line
                    ctx.fillStyle = "#007AFF";
                    ctx.fillRect(0, canvas.height - 5, canvas.width, 5);
                    
                    const finalData = canvas.toDataURL('image/jpeg', 0.8);
                    const preview = document.getElementById('preview-' + type);
                    preview.src = finalData;
                    preview.classList.remove('hidden');
                    
                    if(type === 'intake') imgIntake = finalData; else imgLimpasan = finalData;
                    box.classList.remove('invalid');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function updateClock() {
            const n = new Date();
            const timeEl = document.getElementById('live-time');
            if(timeEl) timeEl.innerText = n.toLocaleTimeString('id-ID').replace(/\./g, ':');
            
            const dayEl = document.getElementById('day-info');
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            if(dayEl) dayEl.innerText = n.toLocaleDateString('id-ID', options).toUpperCase();
        }

        window.onload = () => {
            document.getElementById('tgl').value = new Date().toISOString().split('T')[0];
            document.getElementById('jam').value = new Date().toTimeString().substring(0,5);
            setInterval(updateClock, 1000);
            updateClock();
            setTimeout(() => document.getElementById('splash-screen').classList.add('fade-out'), 2500);
        };

        function validateAndSend() {
            let isValid = true;
            const required = ['petugas', 'tgl', 'jam', 'sDI', 'sB', 'trend', 'tma', 'mon', 'cuaca', 'status'];
            
            required.forEach(id => {
                const el = document.getElementById(id);
                if(!el.value || el.value === "") { el.classList.add('invalid'); isValid = false; }
                else el.classList.remove('invalid');
            });

            if(!imgIntake) { document.getElementById('box-intake').classList.add('invalid'); isValid = false; }
            if(!imgLimpasan) { document.getElementById('box-limpasan').classList.add('invalid'); isValid = false; }

            if(!isValid) {
                const t = document.getElementById('error-toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
                return;
            }
            uploadAndGenerate();
        }

        async function uploadAndGenerate() {
            const btn = document.getElementById('main-btn');
            const sync = document.getElementById('sync-status');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i> MEMPROSES...';
            sync.classList.remove('hidden');

            const payload = {
                petugas: document.getElementById('petugas').value,
                di: (document.getElementById('sDI').value==='m'?document.getElementById('mDI').value:document.getElementById('sDI').value).toUpperCase(),
                bendung: (document.getElementById('sB').value==='m'?document.getElementById('mB').value:document.getElementById('sB').value).toUpperCase(),
                tma: document.getElementById('tma').value,
                mon: document.getElementById('mon').value,
                trend: document.getElementById('trend').value,
                qk: document.getElementById('qk').value,
                dk: document.getElementById('dk').value,
                qr: document.getElementById('qr').value,
                dr: document.getElementById('dr').value,
                cuaca: document.getElementById('cuaca').value,
                status: document.getElementById('status').value,
                mt: document.getElementById('mt').value,
                real: document.getElementById('real').value,
                baku: document.getElementById('baku').value,
                persen: document.getElementById('persen-badge').innerText,
                imageIntake: imgIntake,
                imageLimpasan: imgLimpasan
            };

            let link_in = "Gagal Upload", link_lim = "Gagal Upload";
            
            try {
                const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                link_in = result.url_intake || "Cloud Fail";
                link_lim = result.url_limpasan || "Cloud Fail";
            } catch (err) {
                console.error(err);
            }

            const message = `*LAPORAN DEBIT AIR (V8 PRO)*
━━━━━━━━━━━━━━━━━━
📍 *BENDUNG*: ${payload.bendung}
🏗️ *DAERAH IRIGASI*: ${payload.di}

👤 *PETUGAS*: ${payload.petugas}
📅 *WAKTU*: ${document.getElementById('jam').value} WIB

📊 *DATA TEKNIS*:
• TMA: ${payload.tma} cm
• DEBIT MONITORING: ${payload.mon} (Cm³/dt)
• TREND: ${payload.trend}

💧 *INTAKE KIRI*:
• Q-Act: ${payload.qk} m³/dt
• Q-D: ${payload.dk} m³/dt

💧 *INTAKE KANAN*:
• Q-Act: ${payload.qr} m³/dt
• Q-D: ${payload.dr} m³/dt

🌦️ *KONDISI*:
• CUACA: ${payload.cuaca}
• STATUS: ${payload.status}

🌾 *TANAM*:
• MASA TANAM: ${payload.mt}
• REALISASI: ${payload.real} Ha (${payload.persen})

🔗 *LAMPIRAN FOTO*:
1. Intake: ${link_in}
2. Limpasan: ${link_lim}
━━━━━━━━━━━━━━━━━━
_Dikirim via Official Monitoring System_`;

            // Clipboard Action
            const textarea = document.createElement('textarea');
            textarea.value = message;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            document.getElementById('success-toast').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('success-toast').style.display = 'none';
                window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
            }, 1000);

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-brands fa-whatsapp text-2xl"></i> Kirim Laporan Pro';
            sync.classList.add('hidden');
        }
    </script>
